spring.application.name=pricing-ia-saas
spring.docker.compose.enabled=false

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pricingia_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pricingia_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pricingia_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=pricingia
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.schemas=pricingia
spring.flyway.default-schema=pricingia
spring.flyway.locations=classpath:db/migration

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:pricingia_user}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:pricingia_pass}
# Do not requeue messages that fail processing (avoid poison-message loops).
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# Shopify Webhooks (base)
# Secret comes from configuration (never hardcoded in code).
# Override in real environments: set PRICINGIA_SHOPIFY_WEBHOOK_SECRET="..."
pricingia.shopify.webhook.secret=${PRICINGIA_SHOPIFY_WEBHOOK_SECRET:local-dev-secret}

# Shopify Webhooks (AMQP)
pricingia.shopify.webhooks.exchange=shopify.webhooks.exchange
pricingia.shopify.webhooks.queue=shopify.webhooks.received.queue
pricingia.shopify.webhooks.routing-key=shopify.webhook.received

# CORS (comma-separated origin patterns)
pricingia.cors.allowed-origin-patterns=${PRICINGIA_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.root=INFO
logging.level.com.pricingia=DEBUG
