spring.application.name=pricing-ia-saas
spring.docker.compose.enabled=false

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/pricingia_db
spring.datasource.username=pricingia_user
spring.datasource.password=pricingia_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=pricingia
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.schemas=pricingia
spring.flyway.default-schema=pricingia
spring.flyway.locations=classpath:db/migration

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=pricingia_user
spring.rabbitmq.password=pricingia_pass

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.root=INFO
logging.level.com.pricingia=DEBUG
